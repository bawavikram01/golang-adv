# ─── Application Properties ───────────────────────────────────
spring.main.web-application-type=none
spring.main.banner-mode=off

# ─── Simple properties (used with @Value) ─────────────────────
app.name=Spring Props Demo
app.version=1.0.0
app.debug=false
app.max-retries=3
app.welcome-message=Welcome to ${app.name} v${app.version}!

# ─── List property (comma-separated) ─────────────────────────
app.supported-languages=Java,Kotlin,Groovy

# ─── Nested configuration (used with @ConfigurationProperties) ─
app.mail.host=smtp.example.com
app.mail.port=587
app.mail.username=admin@example.com
app.mail.from-name=App Notifications
app.mail.ssl-enabled=true
app.mail.pool-size=5
app.mail.timeout-seconds=30

# ─── Database config (also @ConfigurationProperties) ──────────
app.database.url=jdbc:postgresql://localhost:5432/myapp
app.database.username=app_user
app.database.password=secret123
app.database.max-connections=10
app.database.driver-class=org.postgresql.Driver
