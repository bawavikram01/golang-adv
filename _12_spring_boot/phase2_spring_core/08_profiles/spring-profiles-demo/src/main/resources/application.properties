# ─── Common/Base Configuration ────────────────────────────────
# Always loaded regardless of active profile.
# Profile-specific files OVERRIDE these values.

spring.main.web-application-type=none
spring.main.banner-mode=off

# Common settings
app.name=Profiles Demo
app.version=1.0.0

# Default database (overridden per profile)
app.database.type=H2
app.database.url=jdbc:h2:mem:default

# Default behavior
app.cache.enabled=false
app.log-level=INFO
